
services:
  postgres:
    image: postgres:16-alpine
    container_name: visa_postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-visabot}
      POSTGRES_USER: ${POSTGRES_USER:-visabot}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./infrastructure/migrations:/docker-entrypoint-initdb.d
    ports:
      - "127.0.0.1:5433:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-visabot}"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: visa_redis
    restart: unless-stopped
    command: redis-server --requirepass ${REDIS_PASSWORD} --maxmemory 256mb --maxmemory-policy allkeys-lru
    volumes:
      - redis_data:/data
    ports:
      - "127.0.0.1:6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  rabbitmq:
    image: rabbitmq:3.13-management-alpine
    container_name: visa_rabbitmq
    restart: unless-stopped
    environment:
      RABBITMQ_DEFAULT_USER: ${RABBITMQ_USER:-visabot}
      RABBITMQ_DEFAULT_PASS: ${RABBITMQ_PASSWORD}
    volumes:
      - rabbitmq_data:/var/lib/rabbitmq
    ports:
      - "127.0.0.1:5672:5672"
      - "127.0.0.1:15672:15672"
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "ping"]
      interval: 15s
      timeout: 10s
      retries: 5

  bot:
    build:
      context: ./bot
      dockerfile: Dockerfile
    container_name: visa_bot
    restart: unless-stopped
    environment:
      - BOT_TOKEN=${BOT_TOKEN}
      - DATABASE_URL=postgresql+asyncpg://${POSTGRES_USER:-visabot}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB:-visabot}
      - REDIS_URL=redis://:${REDIS_PASSWORD}@redis:6379/0
      - RABBITMQ_URL=amqp://${RABBITMQ_USER:-visabot}:${RABBITMQ_PASSWORD}@rabbitmq:5672/
      - ENCRYPTION_KEY=${ENCRYPTION_KEY}
      - ANTICAPTCHA_KEY=${ANTICAPTCHA_KEY}
      - TELEGRAM_PROXY=${TELEGRAM_PROXY}
      - LOG_LEVEL=${LOG_LEVEL:-INFO}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy

  nstbrowser:
    image: nstbrowser/browserless:latest
    container_name: visa_nstbrowser
    restart: unless-stopped
    environment:
      - TOKEN=${NSTBROWSER_API_KEY}
    ports:
      - "127.0.0.1:8848:8848"

  worker:
    platform: linux/amd64
    build:
      context: ./worker
      dockerfile: Dockerfile
    container_name: visa_worker
    restart: unless-stopped
    shm_size: '256mb'
    environment:
      - RABBITMQ_URL=amqp://${RABBITMQ_USER:-visabot}:${RABBITMQ_PASSWORD}@rabbitmq:5672/
      - SITE_PROXY=${SITE_PROXY}
      - MONITOR_INTERVAL_MS=${MONITOR_INTERVAL_MS:-15000}
      - LOG_LEVEL=${LOG_LEVEL:-INFO}
      - NSTBROWSER_API_KEY=${NSTBROWSER_API_KEY}
      - NSTBROWSER_HOST=http://nstbrowser:8848
    depends_on:
      rabbitmq:
        condition: service_healthy
      nstbrowser:
        condition: service_started

volumes:
  postgres_data:
  redis_data:
  rabbitmq_data:
